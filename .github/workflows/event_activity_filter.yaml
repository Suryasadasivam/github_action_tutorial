name: event_activity_trigger

on: 
    workflow_dispatch
jobs:
    my_job_for_event:
        runs-on: ubuntu-latest
        defaults:
            run: 
               working-directory: python_code
        steps:
            - name: checkout code 
              uses: actions/checkout@v4

            - name : set up python 
              uses : actions/setup-python@v5
              with :
                  python-version: "3.11"

            - name : run pythonscripts
              run : python app.py



