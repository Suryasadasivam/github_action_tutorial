name: context_yaml

run-name: 06 - Contexts | DEBUG - ${{ inputs.debug }}

env:
  MY_WORKFLOW_VAR: workflow
  MY_OVERWRITTEN_VAR: workflow

on:
    workflow_dispatch:
        inputs:
            debug:
                description: 'Enable debug mode'
                type: boolean
                default: false

jobs:
    my-first-job-for-context:
        runs-on: ubuntu-latest
        env:
            MY_JOB_VAR: job
            MY_OVERWRITTEN_VAR: job
        defaults:
            run:
                working-directory: python_code
        
        steps:
            - name: my-first-step
              uses: actions/checkout@v4

            - name: python-setup
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name : run pythonscripts
              run : python app.py

            - name: Display information
              run : |
                   echo "Event name : ${{github.event_name}}"
                   echo "Ref : ${{github.ref}}"
                   echo "SHA : ${{github.sha}}"
                   echo "Actor : ${{github.actor}}"
                   echo "Workflow : ${{github.workflow}}"
                   echo "Run ID : ${{github.run_id}}"
                   echo "Run number : ${{github.run_number}}"

            - name: variable information from repo level
              run: |
                echo "repolevel: ${{ vars.VARIABLE }}"

            - name: Print Env Variables
              env:
                MY_OVERWRITTEN_VAR: step
              run: |
                    echo "Workflow env: $MY_WORKFLOW_VAR"
                    echo "Overwritten env: $MY_OVERWRITTEN_VAR"

        